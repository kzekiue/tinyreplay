name: Feature request
description: Suggest an idea (read the scope notes first)
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        TinyReplay is intentionally small and session-replay only. Analytics,
        heatmaps, auth/teams, Postgres/Redis, real-time, mobile SDKs, and plugins
        are explicit non-goals. Out-of-scope requests are closed. See the scope
        section of CONTRIBUTING.md before opening.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that you cannot today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you would like to see.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Why it is in scope
      description: How this fits "session replay only".
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I read the scope section of CONTRIBUTING.md.
          required: true
        - label: I searched existing issues for a duplicate.
          required: true
